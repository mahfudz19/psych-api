quarkus:
  application:
    name: ${APP_NAME:psych-api}
    version: ${APP_VERSION:1.0.0-SNAPSHOT}

  http:
    port: ${QUARKUS_HTTP_PORT:8080}
    host: ${QUARKUS_HTTP_HOST:0.0.0.0}

  mongodb:
    connection-string: ${QUARKUS_MONGODB_CONNECTION_STRING:mongodb://localhost:27017/psych}
    database: ${QUARKUS_MONGODB_DATABASE:psych}

  log:
    level: ${QUARKUS_LOG_LEVEL:INFO}
    console:
      json: ${QUARKUS_LOG_CONSOLE_JSON:false}

  profile: ${QUARKUS_PROFILE:dev}

  smallrye:
    openapi:
      info:
        title: ${QUARKUS_SMALLRYE_OPENAPI_INFO_TITLE:Psych API}
        version: ${QUARKUS_SMALLRYE_OPENAPI_INFO_VERSION:1.0.0-SNAPSHOT}

    jwt:
      # JWT Secret key (minimal 32 characters)
      secret: ${JWT_SECRET:psych-api-secret-key-min-32-chars-change-in-prod}

      # Token expiration in seconds (default: 1 hour = 3600)
      token-expires-in: ${JWT_TOKEN_EXPIRES_IN:3600}

      # Token issuer
      issuer: ${JWT_ISSUER:psych-api}

# Security Configuration
security:
  # BCrypt password hashing rounds (higher = more secure but slower)
  bcrypt-rounds: ${BCRYPT_ROUNDS:10}

  # JWT Configuration (alias untuk quarkus.smallrye.jwt)
  jwt:
    secret: ${JWT_SECRET:psych-api-secret-key-min-32-chars-change-in-prod}
    token-expires-in: ${JWT_TOKEN_EXPIRES_IN:3600}
    issuer: ${JWT_ISSUER:psych-api}
