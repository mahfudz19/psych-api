# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================
quarkus:
  application:
    name: ${APP_NAME:psych-api}
    version: ${APP_VERSION:1.0.0-SNAPSHOT}

  http:
    port: ${HTTP_PORT:8080}
    host: ${HTTP_HOST:0.0.0.0}

    cors:
      enabled: ${CORS_ENABLED:true}
      origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
      methods: ${CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      headers: ${CORS_HEADERS:Content-Type,Authorization,X-Requested-With,Accept,Origin}

  mongodb:
    connection-string: ${MONGODB_URI:mongodb://localhost:27017/psych}
    database: ${MONGODB_DATABASE:psych}

  log:
    level: ${LOG_LEVEL:INFO}
    console:
      json: ${LOG_CONSOLE_JSON:false}

  profile: ${QUARKUS_PROFILE:dev}

  smallrye:
    openapi:
      info:
        title: ${QUARKUS_SMALLRYE_OPENAPI_INFO_TITLE:Psych API}
        version: ${QUARKUS_SMALLRYE_OPENAPI_INFO_VERSION:1.0.0-SNAPSHOT}

# =============================================================================
# JWT SECURITY CONFIGURATION
# =============================================================================
# Note: Using custom 'jwt' prefix instead of 'quarkus.smallrye.jwt'
# because the latter is reserved for Quarkus smallrye-jwt extension
jwt:
  # Token expiration in seconds
  # - Development: 604800 (7 days)
  # - Staging: 86400 (1 day)
  # - Production: 3600 (1 hour)
  expires-in: ${JWT_EXPIRES_IN:604800}

  # Token issuer identifier
  issuer: ${JWT_ISSUER:psych-api}

  # RSA signing key location (relative to src/main/resources)
  sign:
    key:
      location: ${JWT_SIGN_KEY_LOCATION:keys/privateKey.pem}

  # Enable expiration verification
  verify:
    expires-at: ${JWT_VERIFY_EXPIRES_AT:true}

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  bcrypt:
    # Work factor: 10-12 recommended
    # Higher = more secure but slower
    rounds: ${BCRYPT_ROUNDS:10}
