# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================
quarkus:
  application:
    name: ${APP_NAME:psych-api}
    version: ${APP_VERSION:1.0.0}

  http:
    port: ${HTTP_PORT:8080}
    host: ${HTTP_HOST:0.0.0.0}

    cors:
      enabled: ${CORS_ENABLED:true}
      origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
      methods: ${CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      headers: ${CORS_HEADERS:Content-Type,Authorization,X-Requested-With,Accept,Origin}

  mongodb:
    connection-string: ${MONGODB_URI:mongodb://localhost:27017/psych}
    database: ${MONGODB_DATABASE:psych}

  log:
    level: ${LOG_LEVEL:INFO}
    console:
      json: ${LOG_CONSOLE_JSON:false}

  profile: ${QUARKUS_PROFILE:dev}

  smallrye:
    openapi:
      info:
        title: ${QUARKUS_SMALLRYE_OPENAPI_INFO_TITLE:Psych API}
        version: ${QUARKUS_SMALLRYE_OPENAPI_INFO_VERSION:1.0.0}
        description: |
          ## Psych API - Mental Health Platform Backend

          RESTful API untuk platform kesehatan mental dengan fitur:
          - **Authentication & Authorization** - JWT-based authentication dengan role-based access control
          - **User Management** - Individual dan Organization accounts
          - **Content Management** - Post/article management system
          - **Referral System** - User referral dan organization invitation
          - **Subscription** - Multi-tier subscription (free, premium, enterprise)

          ### Security
          API ini menggunakan JWT Bearer token authentication. Untuk mengakses endpoint yang dilindungi:
          1. Dapatkan token melalui endpoint `/api/v1/auth/login`
          2. Sertakan token di Authorization header: `Authorization: Bearer <your-token>`
          3. Token akan expire sesuai konfigurasi (default: 7 hari)

          ### Response Format
          Semua response mengikuti format standar:
          ```json
          {
            "success": true,
            "data": { ... },
            "message": "Success message",
            "meta": { ... },
            "code": null,
            "errors": null
          }
          ```

          ### Support
          Untuk bantuan atau pertanyaan, hubungi support@psychapi.com
        contact:
          name: ${QUARKUS_SMALLRYE_OPENAPI_CONTACT_NAME:Psych API Support}
          email: ${QUARKUS_SMALLRYE_OPENAPI_CONTACT_EMAIL:support@psychapi.com}
          url: ${QUARKUS_SMALLRYE_OPENAPI_CONTACT_URL:https://psychapi.com/support}
        license:
          name: ${QUARKUS_SMALLRYE_OPENAPI_LICENSE:Apache 2.0}
          url: ${QUARKUS_SMALLRYE_OPENAPI_LICENSE_URL:https://www.apache.org/licenses/LICENSE-2.0}
        termsOfService: ${QUARKUS_SMALLRYE_OPENAPI_TERMS:https://psychapi.com/terms}

      # Server definitions for different environments
      servers:
        - url: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_0_URL:http://localhost:8080}
          description: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_0_DESCRIPTION:Development server}
        - url: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_1_URL:https://staging-api.psychapi.com}
          description: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_1_DESCRIPTION:Staging server}
        - url: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_2_URL:https://api.psychapi.com}
          description: ${QUARKUS_SMALLRYE_OPENAPI_SERVER_2_DESCRIPTION:Production server}

      # Security schemes
      securitySchemes:
        Bearer:
          type: ${QUARKUS_SMALLRYE_OPENAPI_SECURITY_SCHEME_BEARER_TYPE:HTTP}
          scheme: ${QUARKUS_SMALLRYE_OPENAPI_SECURITY_SCHEME_BEARER_SCHEME:bearer}
          bearerFormat: ${QUARKUS_SMALLRYE_OPENAPI_SECURITY_SCHEME_BEARER_FORMAT:JWT}
          description: |
            JWT Bearer token authentication.

            ### Cara Menggunakan
            1. Login melalui endpoint `/api/v1/auth/login` dengan email dan password
            2. Copy token dari response field `data.token`
            3. Klik tombol "Authorize" di Swagger UI
            4. Paste token dengan format: `Bearer <your-token-here>`
            5. Token akan otomatis disertakan di setiap request yang memerlukan authentication

            ### Token Expiration
            - Default: 7 hari (604800 seconds)
            - Token akan expire dan perlu login ulang
            - Tidak ada refresh token mechanism saat ini

            ### Security Considerations
            - Simpan token dengan aman
            - Jangan share token ke siapapun
            - Gunakan HTTPS di production
            - Logout untuk invalidate token

      # Swagger UI configuration
      swagger-ui:
        always-include: ${QUARKUS_SMALLRYE_OPENAPI_SWAGGER_UI_ALWAYS_INCLUDE:true}
        path: ${QUARKUS_SMALLRYE_OPENAPI_SWAGGER_UI_PATH:/q/swagger-ui}
        title: ${QUARKUS_SMALLRYE_OPENAPI_SWAGGER_UI_TITLE:Psych API - Documentation}

      # OpenAPI document paths
      path: ${QUARKUS_SMALLRYE_OPENAPI_PATH:/api/openapi}

jwt:
  expires-in: ${JWT_EXPIRES_IN:604800}

  # Token issuer identifier
  issuer: ${JWT_ISSUER:psych-api}

  # Signing secret (HS256)
  sign:
    secret: ${JWT_SECRET:your-super-secret-key-at-least-32-chars}

  # Enable expiration verification
  verify:
    expires-at: ${JWT_VERIFY_EXPIRES_AT:true}

superadmin:
  emails: ${SUPERADMIN_EMAILS:admin@psycorp.com}
